<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>餐饮店财务管理</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" id="appHeader">
      <h1 id="headerTitle">🍽️ 餐饮店财务管理</h1>
      <div class="header-actions" id="headerActions"></div>
    </header>

    <!-- Main Content -->
    <main class="app-main" id="appMain">
      <div class="loading-spinner" id="globalLoading">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav" style="display:none;">
      <a href="#/home" class="nav-item active" data-page="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">首页</span>
      </a>
      <a href="#/record" class="nav-item" data-page="record">
        <span class="nav-icon">📝</span>
        <span class="nav-label">记账</span>
      </a>
      <a href="#/requests" class="nav-item" data-page="requests">
        <span class="nav-icon">📋</span>
        <span class="nav-label">申请</span>
      </a>
      <a href="#/reports" class="nav-item" data-page="reports">
        <span class="nav-icon">📊</span>
        <span class="nav-label">报表</span>
      </a>
      <a href="#/profile" class="nav-item" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">我的</span>
      </a>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal" style="display:none;">
      <div class="modal-box">
        <p id="confirmMessage"></p>
        <div class="modal-actions">
          <button class="btn btn-default" id="confirmCancel">取消</button>
          <button class="btn btn-primary" id="confirmOk">确定</button>
        </div>
      </div>
    </div>

    <!-- Image Preview Modal -->
    <div class="modal-overlay" id="imageModal" style="display:none;">
      <div class="image-preview-container">
        <button class="image-close" id="imageClose">✕</button>
        <img id="imagePreview" src="" alt="预览">
      </div>
    </div>
  </div>

  <!-- API: 内嵌以避免加载问题 -->
  <script>
// API wrapper
const API = {
  baseUrl: '/api',
  
  async request(method, path, data) {
    const opts = {
      method,
      headers: {},
      credentials: 'same-origin'
    };
    
    if (data instanceof FormData) {
      opts.body = data;
    } else if (data) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(data);
    }
    
    const res = await fetch(this.baseUrl + path, opts);
    const json = await res.json();
    
    if (!res.ok) {
      throw new Error(json.error || '请求失败');
    }
    
    return json;
  },
  
  login(username, password) {
    return this.request('POST', '/auth/login', { username, password });
  },
  
  logout() {
    return this.request('POST', '/auth/logout');
  },
  
  getMe() {
    return this.request('GET', '/auth/me');
  },
  
  getTransactions(params = {}) {
    const query = new URLSearchParams(params).toString();
    return this.request('GET', '/transactions' + (query ? '?' + query : ''));
  },
  
  createTransaction(data) {
    return this.request('POST', '/transactions', data);
  },
  
  getTransaction(id) {
    return this.request('GET', '/transactions/' + id);
  },
  
  deleteTransaction(id) {
    return this.request('DELETE', '/transactions/' + id);
  },
  
  getRequests(params = {}) {
    const query = new URLSearchParams(params).toString();
    return this.request('GET', '/requests' + (query ? '?' + query : ''));
  },
  
  getPendingRequests() {
    return this.request('GET', '/requests/pending/mine');
  },
  
  createRequest(data) {
    return this.request('POST', '/requests', data);
  },
  
  getRequest(id) {
    return this.request('GET', '/requests/' + id);
  },
  
  approveRequest(id, stage, comment) {
    return this.request('POST', '/requests/' + id + '/approve', { stage, comment });
  },
  
  rejectRequest(id, stage, reason) {
    return this.request('POST', '/requests/' + id + '/reject', { stage, reason });
  },
  
  getApprovalInfo(token) {
    return this.request('GET', '/requests/approve/' + token);
  },
  
  submitApproval(token, decision, comment) {
    return this.request('POST', '/requests/approve/' + token, { decision, comment });
  },
  
  getDashboardStats() {
    return this.request('GET', '/dashboard/stats');
  },
  
  getDashboardCategories() {
    return this.request('GET', '/dashboard/categories');
  },
  
  getUsers() {
    return this.request('GET', '/users');
  },
  
  createUser(data) {
    return this.request('POST', '/users', data);
  }
};
  </script>
  <script src="/js/utils.js?v=2"></script>
  <script src="/js/pages/login.js?v=2"></script>
  <script src="/js/pages/home.js?v=2"></script>
  <script src="/js/pages/record.js?v=2"></script>
  <script src="/js/pages/transactions.js?v=2"></script>
  <script src="/js/pages/requests.js?v=2"></script>
  <script src="/js/pages/request-form.js?v=2"></script>
  <script src="/js/pages/request-detail.js?v=2"></script>
  <script src="/js/pages/approve.js?v=2"></script>
  <script src="/js/pages/profile.js?v=2"></script>
  <script src="/js/pages/reports.js?v=1"></script>
  <script src="/js/app.js?v=3"></script>
</body>
</html>
