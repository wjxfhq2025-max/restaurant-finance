services:
  - type: web
    name: restaurant-finance
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
    databases:
      - name: restaurant-finance-db
        databaseName: restaurant_finance
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: restaurant-finance-db
    databaseName: restaurant_finance
    user: restaurant_finance_user
    plan: free
